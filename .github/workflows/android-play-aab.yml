name: Android Play AAB

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-android-release:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      # Supabase public keys — inlined by Next.js at build time
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

      # Android signing
      EXITPLAN_UPLOAD_STORE_FILE: ${{ github.workspace }}/android/keystore/upload.jks
      EXITPLAN_UPLOAD_STORE_PASSWORD: ${{ secrets.EXITPLAN_UPLOAD_STORE_PASSWORD }}
      EXITPLAN_UPLOAD_KEY_ALIAS: ${{ secrets.EXITPLAN_UPLOAD_KEY_ALIAS }}
      EXITPLAN_UPLOAD_KEY_PASSWORD: ${{ secrets.EXITPLAN_UPLOAD_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        run: |
          test -n "$NEXT_PUBLIC_SUPABASE_URL" || (echo "Missing NEXT_PUBLIC_SUPABASE_URL secret" && exit 1)
          test -n "$NEXT_PUBLIC_SUPABASE_ANON_KEY" || (echo "Missing NEXT_PUBLIC_SUPABASE_ANON_KEY secret" && exit 1)
          test -n "${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}" || (echo "Missing ANDROID_UPLOAD_KEYSTORE_BASE64 secret" && exit 1)
          test -n "$EXITPLAN_UPLOAD_STORE_PASSWORD" || (echo "Missing EXITPLAN_UPLOAD_STORE_PASSWORD secret" && exit 1)
          test -n "$EXITPLAN_UPLOAD_KEY_ALIAS" || (echo "Missing EXITPLAN_UPLOAD_KEY_ALIAS secret" && exit 1)
          test -n "$EXITPLAN_UPLOAD_KEY_PASSWORD" || (echo "Missing EXITPLAN_UPLOAD_KEY_PASSWORD secret" && exit 1)

      - name: Decode upload keystore
        run: |
          mkdir -p android/keystore
          echo "${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}" | base64 --decode > android/keystore/upload.jks

      # Build a self-contained static export — NO remote server.url.
      # This bundles all HTML/JS/CSS into android/app/src/main/assets/
      # so the app works offline and passes Play Store review.
      - name: Build static export & sync to Android
        run: npm run mobile:android:static

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build release AAB
        working-directory: android
        run: ./gradlew bundleRelease

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload Play AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
