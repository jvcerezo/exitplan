name: Sandalan Android (Flutter) Build

on:
  workflow_dispatch:
  repository_dispatch:
    types: [sandalan-android-build]

env:
  FLUTTER_VERSION: '3.41.5'
  JAVA_VERSION: '17'

jobs:
  build-signed:
    name: Build Signed APK & AAB
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout sandalan-android repo
        uses: actions/checkout@v4
        with:
          repository: jvcerezo/sandalan-android
          # If sandalan-android is private, add a PAT secret named SANDALAN_REPO_TOKEN
          token: ${{ secrets.SANDALAN_REPO_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      # Decode the SAME keystore used for Capacitor builds
      - name: Decode upload keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.EXITPLAN_UPLOAD_STORE_PASSWORD }}
          keyPassword=${{ secrets.EXITPLAN_UPLOAD_KEY_PASSWORD }}
          keyAlias=${{ secrets.EXITPLAN_UPLOAD_KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      # Build signed release AAB (for Play Store)
      - name: Build Signed AAB
        run: flutter build appbundle --release --build-number=${{ github.run_number }}

      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: sandalan-flutter-signed-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 90

      # Build signed release APK (for direct install)
      - name: Build Signed APK
        run: flutter build apk --release --build-number=${{ github.run_number }}

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: sandalan-flutter-signed-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

      # Also build debug APK
      - name: Build Debug APK
        run: flutter build apk --debug --build-number=${{ github.run_number }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: sandalan-flutter-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
