name: Flutter Sandalan Build

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to build from sandalan-android"
        default: "main"
        required: false

jobs:
  build-flutter-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout sandalan-android
        uses: actions/checkout@v4
        with:
          repository: jvcerezo/sandalan-android
          ref: ${{ github.event.inputs.ref || 'main' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.5"
          channel: stable
          cache: true

      - name: Auto-increment version code
        run: |
          # Read current version from pubspec.yaml
          CURRENT=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          NEW=$((CURRENT + ${{ github.run_number }}))
          VERSION_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          sed -i "s/^version: .*/version: ${VERSION_NAME}+${NEW}/" pubspec.yaml
          echo "Building with versionCode=${NEW}"

      - name: Create .env file
        run: |
          cat > .env << ENVEOF
          SUPABASE_URL=${{ secrets.SANDALAN_SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SANDALAN_SUPABASE_ANON_KEY }}
          GOOGLE_WEB_CLIENT_ID=${{ secrets.SANDALAN_GOOGLE_WEB_CLIENT_ID }}
          ENVEOF
          # Strip leading whitespace from each line
          sed -i 's/^[[:space:]]*//' .env

      - name: Install dependencies
        run: flutter pub get

      - name: Generate envied code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Validate secrets
        run: |
          test -n "${{ secrets.SANDALAN_KEYSTORE_BASE64 }}" || (echo "Missing SANDALAN_KEYSTORE_BASE64" && exit 1)
          test -n "${{ secrets.SANDALAN_STORE_PASSWORD }}" || (echo "Missing SANDALAN_STORE_PASSWORD" && exit 1)
          test -n "${{ secrets.SANDALAN_KEY_ALIAS }}" || (echo "Missing SANDALAN_KEY_ALIAS" && exit 1)
          test -n "${{ secrets.SANDALAN_KEY_PASSWORD }}" || (echo "Missing SANDALAN_KEY_PASSWORD" && exit 1)

      - name: Decode signing keystore
        run: |
          mkdir -p android/keystore
          echo "${{ secrets.SANDALAN_KEYSTORE_BASE64 }}" | base64 --decode > android/keystore/sandalan.jks

      - name: Create key.properties
        run: |
          cat > android/app/key.properties << KEYEOF
          storePassword=${{ secrets.SANDALAN_STORE_PASSWORD }}
          keyPassword=${{ secrets.SANDALAN_KEY_PASSWORD }}
          keyAlias=${{ secrets.SANDALAN_KEY_ALIAS }}
          storeFile=../../android/keystore/sandalan.jks
          KEYEOF
          sed -i 's/^[[:space:]]*//' android/app/key.properties

      - name: Build release APK
        run: flutter build apk --release

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sandalan-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: sandalan-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
